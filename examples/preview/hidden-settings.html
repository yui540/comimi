<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manga Viewer Preview — Hidden settings</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #eee;
        color: #333;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: 100%;
        margin: 0 auto;
        padding: 60px 0;
      }

      .note {
        max-width: 900px;
        margin: 0 auto 24px;
        padding: 0 16px;
        font-size: 14px;
        line-height: 1.7;
      }

      .note code {
        background: #ddd;
        border-radius: 4px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="note">
        <p>
          <code>hiddenSettings</code> で
          <strong>自動再生ボタン</strong>を非表示にし、設定パネルの
          <strong>言語</strong> / <strong>テーマ</strong>
          を読み取り専用（値は見えるが変更不可）にした例です。オーバーレイを開いて確認してください。
        </p>
      </div>
      <div id="viewer"></div>
    </main>
    <script type="module" src="/src/hidden-settings.ts"></script>
  </body>
</html>
